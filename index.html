<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WINGO সিগন্যাল টুলস</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-wrapper">
    <!-- ছোট সিগন্যাল উইজেট -->
    <div class="signal-widget compact" id="signalWidget">
        <div class="widget-header" id="dragHandle">
            <div class="drag-handle">
                <span>🎲</span> 
                <span>WINGO</span>
            </div>
            <div class="resize-controls">
                <button class="resize-btn" id="makeSmall" title="ছোট">−</button>
                <button class="resize-btn" id="makeLarge" title="বড়">+</button>
            </div>
        </div>

        <div class="signal-content">
            <div class="signal-row">
                <div class="signal-number" id="signalNumber">--</div>
            </div>
            <div class="signal-info">
                <span class="signal-size" id="signalSize">---</span>
                <span class="signal-color" id="signalColor">-----</span>
            </div>
        </div>

        <div class="control-panel">
            <div class="period-row">
                <label>Period:</label>
                <input type="number" id="periodNumber" value="1" min="1">
                <div class="timer-buttons">
                    <button class="timer-btn mini" data-time="30">30s</button>
                    <button class="timer-btn mini" data-time="60">1m</button>
                </div>
            </div>
            <div class="action-row">
                <button id="saveStartBtn" class="action-start">▶ শুরু</button>
                <button id="stopResetBtn" class="action-stop">⏹ বন্ধ</button>
            </div>
            <div class="status-row">
                <span>⏱️ <span id="timerDisplay">0</span>s</span>
                <span>📊 Period: <strong id="currentPeriodLabel">1</strong></span>
            </div>
        </div>
    </div>

    <div class="embed-container">
        <iframe 
            src="https://hgnice.biz/#/register?invitationCode=255721948910" 
            title="WINGO ট্রেডিং প্ল্যাটফর্ম"
            allow="accelerometer; clipboard-write; encrypted-media; fullscreen"
            referrerpolicy="strict-origin">
        </iframe>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
