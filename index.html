<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>WINGO প্রেডিকশন | ট্রেডিং টুল</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <!-- এম্বেড করা লাইভ পেজ (hgnice.biz) -->
    <div class="iframe-wrapper">
        <iframe src="https://hgnice.biz/#/register?invitationCode=255721948910" 
                title="WINGO ট্রেডিং প্ল্যাটফর্ম"
                allow="accelerometer; clipboard-write; encrypted-media; fullscreen"
                referrerpolicy="strict-origin">
        </iframe>
    </div>

    <!-- প্রেডিকশন উইজেট (মোবাইলের ১/৪ অংশ) -->
    <div class="prediction-widget" id="predictionWidget">
        <!-- হেডার: টাইটেল + সেটিংস আইকন -->
        <div class="widget-header">
            <div class="title">
                <span class="wingo-badge">🎲 WINGO</span>
                <span class="time-mode" id="timeModeLabel">30 SECOND</span>
            </div>
            <button class="settings-icon" id="settingsIcon">⚙️</button>
        </div>

        <!-- পিরিয়ড নাম্বার -->
        <div class="period-row">
            <label>পিরিয়ড নং</label>
            <div class="period-value" id="periodDisplay">11181</div>
        </div>

        <!-- কাউন্টডাউন টাইমার (সার্কেল) -->
        <div class="timer-circle" id="timerCircle">
            <span id="timerSeconds">30</span>
            <small>সেকেন্ড</small>
        </div>

        <!-- এলোমেলো নাম্বার -->
        <div class="number-box" id="numberBox">
            <span id="predictionNumber">?</span>
        </div>

        <!-- সাইজ ও কালার ফলাফল -->
        <div class="result-row">
            <div class="size-card" id="sizeCard">
                <span>সাইজ</span>
                <strong id="sizeValue">---</strong>
            </div>
            <div class="color-card" id="colorCard">
                <span>রং</span>
                <strong id="colorValue">-----</strong>
            </div>
        </div>

        <!-- স্ট্যাটাস বার (active/inactive) -->
        <div class="status-bar" id="statusBar">
            <span>⚫ বন্ধ</span>
        </div>
    </div>

    <!-- সেটিংস মোডাল (পপআপ) -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>⚙️ সেটিংস</h3>
                <button class="close-modal" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>পিরিয়ড নাম্বার</label>
                    <input type="number" id="periodInput" value="11181" min="1">
                </div>
                <div class="input-group">
                    <label>টাইম সিলেক্ট</label>
                    <div class="time-buttons">
                        <button class="time-option" data-time="30">30 সেকেন্ড</button>
                        <button class="time-option" data-time="60">1 মিনিট</button>
                    </div>
                </div>
                <div class="action-buttons">
                    <button id="modalStartBtn" class="btn-start">▶ শুরু</button>
                    <button id="modalStopBtn" class="btn-stop">⏹ বন্ধ</button>
                </div>
                <p class="modal-hint">💡 প্রতি রাউন্ড শেষে নতুন সিগন্যাল আসবে</p>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
