<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>WINGO Prediction | Trading Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

    <!-- Site Selector Screen -->
    <div class="site-selector" id="siteSelectorScreen">
        <div class="selector-box">
            <div class="selector-logo">🎲 WINGO Tool</div>
            <p class="selector-subtitle">Select your platform to continue</p>
            <div class="selector-buttons">
                <button class="site-btn hgnice-btn" id="hgniceBtn">
                    <span class="site-icon">🟠</span>
                    <div class="site-text">
                        <span class="site-name">HGNICE</span>
                        <span class="site-desc">hgnice.biz</span>
                    </div>
                </button>
                <button class="site-btn dkwin-btn" id="dkwinBtn">
                    <span class="site-icon">🔵</span>
                    <div class="site-text">
                        <span class="site-name">DKWIN</span>
                        <span class="site-desc">dkwin9.com</span>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div class="main-app" id="mainApp" style="display:none;">

        <!-- Embedded iframe -->
        <div class="iframe-wrapper">
            <iframe id="mainIframe"
                    src=""
                    title="Trading Platform"
                    allow="accelerometer; clipboard-write; encrypted-media; fullscreen"
                    referrerpolicy="strict-origin">
            </iframe>
        </div>

        <!-- Prediction Widget -->
        <div class="prediction-widget" id="predictionWidget">

            <!-- Drag Handle -->
            <div class="drag-handle" id="dragHandle">
                <span class="drag-dots">⠿</span>
            </div>

            <!-- Header -->
            <div class="widget-header">
                <div class="title">
                    <span class="wingo-badge">🎲 WINGO</span>
                    <span class="time-mode" id="timeModeLabel">30 SEC</span>
                </div>
                <div class="header-icons">
                    <button class="icon-btn home-icon" id="homeIcon" title="Change Platform">🏠</button>
                    <button class="icon-btn settings-icon" id="settingsIcon" title="Settings">⚙️</button>
                </div>
            </div>

            <!-- Period -->
            <div class="period-row">
                <label>PERIOD NO</label>
                <div class="period-value" id="periodDisplay">11181</div>
            </div>

            <!-- Timer -->
            <div class="timer-circle" id="timerCircle">
                <span id="timerSeconds">30</span>
                <small>SEC</small>
            </div>

            <!-- Number -->
            <div class="number-box" id="numberBox">
                <span id="predictionNumber">?</span>
            </div>

            <!-- Size & Color -->
            <div class="result-row">
                <div class="size-card" id="sizeCard">
                    <span>SIZE</span>
                    <strong id="sizeValue">---</strong>
                </div>
                <div class="color-card" id="colorCard">
                    <span>COLOR</span>
                    <strong id="colorValue">---</strong>
                </div>
            </div>

            <!-- Status -->
            <div class="status-bar" id="statusBar">
                <span>⚫ STOPPED</span>
            </div>

        </div>

        <!-- Settings Modal -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>⚙️ Settings</h3>
                    <button class="close-modal" id="closeModalBtn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="input-group">
                        <label>Period Number</label>
                        <input type="number" id="periodInput" value="11181" min="1">
                    </div>
                    <div class="input-group">
                        <label>Select Time</label>
                        <div class="time-buttons">
                            <button class="time-option" data-time="30">30 Seconds</button>
                            <button class="time-option" data-time="60">1 Minute</button>
                        </div>
                    </div>
                    <div class="action-buttons">
                        <button id="modalStartBtn" class="btn-start">▶ Start</button>
                        <button id="modalStopBtn" class="btn-stop">⏹ Stop</button>
                    </div>
                    <p class="modal-hint">💡 New signal appears after each round</p>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
